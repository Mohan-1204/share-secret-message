<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Secure-Stego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --industro-orange: #ff5e14; --industro-navy: #001d3d; }

        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            padding: 40px 0;
        }

        .register-container {
            background: white;
            border-top: 5px solid var(--industro-orange);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px; /* Wider for multi-column layout */
            padding: 40px;
            border-radius: 4px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            background: var(--industro-orange);
            color: white;
            width: 50px;
            height: 50px;
            line-height: 50px;
            border-radius: 50%;
            font-size: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--industro-navy);
            text-transform: uppercase;
        }

        .form-control, .form-select {
            border-radius: 0;
            padding: 10px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--industro-navy);
            box-shadow: none;
        }

        .btn-register {
            background-color: var(--industro-navy);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border-radius: 0;
        }

        .btn-register:hover {
            background-color: var(--industro-orange);
            color: white;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
        <h3 class="fw-bold" style="color: var(--industro-navy);">CREATE ACCOUNT</h3>
        <p class="text-muted small">Join our secure data sharing network</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-info py-2 text-center small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="" selected disabled>Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="9876543210" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="2" placeholder="Enter your full address" required></textarea>
        </div>

        <hr class="my-4">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="uname" class="form-control" placeholder="johndoe123" required>
            </div>

            <div class="col-md-6 mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
        </div>

        <button type="submit" class="btn btn-register mb-3">Register Now</button>

        <div class="text-center">
            <p class="small text-muted">Already have an account? <a href="/login" style="color: var(--industro-orange); text-decoration: none; font-weight: bold;">Login Here</a></p>
            <a href="/" class="small text-decoration-none text-secondary"><i class="fas fa-arrow-left me-1"></i> Back to Home</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
