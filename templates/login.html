<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure-Stego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --industro-orange: #ff5e14; --industro-navy: #001d3d; }

        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
        }

        .login-container {
            background: white;
            border-top: 5px solid var(--industro-orange);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 4px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo-icon {
            background: var(--industro-orange);
            color: white;
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            font-size: 24px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 0;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--industro-navy);
            box-shadow: none;
        }

        .btn-login {
            background-color: var(--industro-navy);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border-radius: 0;
        }

        .btn-login:hover {
            background-color: var(--industro-orange);
            color: white;
        }

        .flash-msg {
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <div class="logo-icon"><i class="fas fa-lock"></i></div>
        <h3 class="fw-bold" style="color: var(--industro-navy);">USER LOGIN</h3>
        <p class="text-muted small">Access the secure steganography portal</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger flash-msg">{{ message }}</div>
        {% endfor %}
      {%endif%}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold">EMAIL ADDRESS</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                <input type="email" name="email" class="form-control border-start-0" placeholder="name@example.com" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold">PASSWORD</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-key text-muted"></i></span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="********" required>
            </div>
        </div>

        <button type="submit" class="btn btn-login mb-3">Login to Dashboard</button>

        <div class="text-center">
            <p class="small text-muted">Don't have an account? <a href="/register" style="color: var(--industro-orange); text-decoration: none; font-weight: bold;">Register Here</a></p>
            <a href="/" class="small text-decoration-none text-secondary"><i class="fas fa-arrow-left me-1"></i> Back to Home</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
